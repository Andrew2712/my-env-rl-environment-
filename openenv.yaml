name: password-policy-env
version: 1.0.0
description: Black-box password generation environment.

tasks:
  - id: easy
    name: validate_password
    description: Evaluate and improve a starting password against the hidden policy.
    score_range:
      min: 0.001
      max: 0.999

  - id: medium
    name: fix_password
    description: Fix a non-compliant password iteratively using reward signal.
    score_range:
      min: 0.001
      max: 0.999

  - id: hard
    name: generate_compliant_password
    description: Generate a compliant password from scratch using reward signal only.
    score_range:
      min: 0.001
      max: 0.999
